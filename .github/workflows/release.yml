name: release

# Builds self-contained Windows publishes (server + client tray) on tag push
# and attaches the zipped artifacts to a GitHub Release.
#
#   git tag v0.2.0
#   git push origin v0.2.0
#
# ...then watch the Actions tab; when green, the Release page has:
#   OpenPrintDeploy.Server.msi           <- copy to the print server, install
#   OpenPrintDeploy-client-win-x64.zip   <- deploy via Intune to endpoints

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create the Release + upload assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve release version from tag
        id: ver
        shell: powershell
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build + test
        run: dotnet test OpenPrintDeploy.sln -c Release -p:NuGetAudit=true --nologo

      - name: Build server MSI
        run: .\scripts\Publish-Server.ps1 -Version "${{ steps.ver.outputs.version }}"
        shell: powershell

      - name: Create Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          # The server MSI is the primary artifact (it bundles the client). The
          # bare client MSI is published too for admins who deploy via Intune with
          # SERVER=/CERTTHUMBPRINT= properties rather than the dashboard download.
          files: |
            publish/OpenPrintDeploy.Server.msi
            publish/OpenPrintDeploy.Client.msi
          draft: false
          prerelease: false
          generate_release_notes: true
